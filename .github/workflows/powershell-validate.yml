name: PowerShell Validation

on:
  push:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'
      - '.github/workflows/powershell-validate.yml'
  pull_request:
    paths:
      - '**/*.ps1'
      - '**/*.psm1'
      - '**/*.psd1'

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Path . -Include *.ps1,*.psm1,*.psd1 -Recurse
          if (-not $files) {
            Write-Host 'No PowerShell files found.'
            exit 0
          }

          foreach ($file in $files) {
            Write-Host "Validating $($file.FullName)"
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null

            if ($errors.Count -gt 0) {
              $errors | Format-List *
              throw "PowerShell syntax validation failed for $($file.FullName)"
            }
          }

          Write-Host 'PowerShell syntax validation passed.'
